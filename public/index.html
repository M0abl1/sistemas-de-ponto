<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Ponto - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-6">
    <div class="text-center space-y-2">
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Controle de Ponto</h1>
      <p class="text-sm text-gray-500">Insira suas credenciais para acessar o sistema</p>
    </div>

    <form id="formLoginMvc" class="space-y-4">
      <div class="space-y-1">
        <label id="labelIdentificador" for="identificador" class="text-xs font-semibold text-gray-600 uppercase tracking-wider">CPF ou E-mail Admin</label>
        <input type="text" id="identificador" placeholder="000.000.000-00 ou admin@email.com" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:border-blue-500 focus:bg-white transition-all font-sans">
      </div>

      <div class="space-y-1">
        <label for="password" class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Senha</label>
        <!-- Container relativo para envelopar o input e o botão juntos -->
        <div class="relative flex items-center">
          <input type="password" id="password" placeholder="••••••••" required class="w-full px-4 py-3 pr-12 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
          
          <!-- Botão para alternar a visibilidade da senha -->
          <button type="button" id="btnAlternarSenha" class="absolute right-4 text-xs font-bold text-blue-600 hover:text-blue-700 focus:outline-none select-none transition-colors">
            Mostrar
          </button>
        </div>
      </div>

      <div id="mensagemErro" class="text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl p-3 text-center hidden font-medium transition-all"></div>

      <button type="submit" class="w-full py-3.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-sm transition-all text-center block">
        Entrar no Sistema
      </button>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

  <script src="src/config/firebase-config.js"></script>
  <script src="src/models/PontoModel.js"></script>
  <script src="src/controllers/AuthController.js"></script>
  <script src="src/views/loginView.js"></script>
</body>
</html>
