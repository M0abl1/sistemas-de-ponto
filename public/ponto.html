<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Ponto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800 font-sans p-4">

  <header class="w-full max-w-md mx-auto flex items-center justify-between py-4 border-b border-gray-100">
    <div>
      <span id="saudacaoTexto" class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Olá, funcionário</span>
      <h2 id="nomeFuncionario" class="text-lg font-bold text-gray-900">Área do Colaborador</h2>
    </div>
    <button onclick="AuthController.efetuarLogout()" class="text-xs font-medium text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-all">
      Sair
    </button>
  </header>

  <main class="w-full max-w-md mx-auto flex-1 flex flex-col justify-center space-y-6 my-6">
    <div class="text-center space-y-1 bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
      <div id="relogio" class="text-4xl font-extrabold tracking-tight text-gray-900 font-mono">00:00:00</div>
      <div id="dataAtual" class="text-xs text-gray-400 uppercase font-medium tracking-wider">Carregando data...</div>
    </div>

    <div id="statusGpsBox" class="bg-amber-50 border border-amber-100 rounded-xl p-4 flex items-center space-x-3 transition-all">
      <div class="w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse"></div>
      <span id="statusGpsTexto" class="text-xs font-medium text-amber-800">Aguardando autorização de localização...</span>
    </div>

    <button id="btnBaterPonto" disabled onclick="FuncionarioController.registrarBatidaPonto()" class="w-full py-5 bg-gray-300 text-gray-500 font-bold text-lg rounded-2xl shadow-sm transition-all text-center uppercase tracking-wide cursor-not-allowed">
      Registrar Ponto
    </button>

    <div class="space-y-3">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider px-1">Registros de Hoje</h3>
      <div id="listaRegistrosHoje" class="bg-white border border-gray-100 rounded-2xl p-4 divide-y divide-gray-50 text-sm">
        <p class="text-gray-400 text-center py-2 text-xs">Nenhum ponto registrado hoje.</p>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

  <script src="src/config/firebase-config.js"></script>
  <script src="src/models/PontoModel.js"></script>
  <script src="src/controllers/AuthController.js"></script>
  
  <script src="src/views/pontoView.js"></script>
</body>
</html>
